            aws ssm wait command-executed --command-id \$(cat /tmp/cmd.id) --instance-id \"$INSTANCE_ID\" 2>/dev/null; do echo 'Waiting for K3s...'; sleep 10; done"

          # Fetch kubeconfig using SSM
