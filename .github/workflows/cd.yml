          # Wait for SSM agent to be online
          echo "Waiting for SSM agent to be ready..."
          timeout 300 bash -c "until aws ssm describe-instance-information --filters \"Key=InstanceIds,Values=$INSTANCE_ID\" --query \"InstanceInformationList[0].PingStatus\" --output text | grep -q Online; do echo 'Waiting for SSM...'; sleep 10; done"
          echo "SSM agent is online!"

      - name: Set kubeconfig (production)
        shell: bash
        run: |
          set -euo pipefail
          cd production
          SERVER_IP=$(terraform output -raw server_public_ip)

          # Wait for K3s to be ready using SSM
          echo "Waiting for K3s to be ready..."
          timeout 300 bash -c "until aws ssm send-command \
