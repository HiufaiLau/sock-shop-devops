name: CD (Deploy)

on:
  push:
    branches:
      - staging
      - master

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install tools (terraform, kubectl, helm)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip ca-certificates curl

          TF_VER="1.6.6"
          curl -fsSL -o terraform.zip "https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip"
          unzip -q terraform.zip
          sudo install -m 0755 terraform /usr/local/bin/terraform

          KUBECTL_VER="v1.27.3"
          curl -fsSL -o kubectl "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl

          HELM_VER="v3.13.3"
          curl -fsSL -o helm.tar.gz "https://get.helm.sh/helm-${HELM_VER}-linux-amd64.tar.gz"
          tar -xzf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

      - name: Terraform apply (staging)
        shell: bash
        run: |
          set -euo pipefail
          cd staging
          terraform init
          terraform apply -auto-approve

      - name: Get instance ID and wait for SSM
        shell: bash
        run: |
          set -euo pipefail
          cd staging

          # Get instance ID from Terraform output
          INSTANCE_ID=$(terraform output -raw server_instance_id)

          echo "Instance ID: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

          # Wait for SSM agent to be online
          echo "Waiting for SSM agent to be ready..."
          timeout 300 bash -c "until aws ssm describe-instance-information --filters \"Key=InstanceIds,Values=$INSTANCE_ID\" --query \"InstanceInformationList[0].PingStatus\" --output text | grep -q Online; do echo 'Waiting for SSM...'; sleep 10; done"
          echo "SSM agent is online!"

      - name: Set kubeconfig (staging)
        shell: bash
        run: |
          set -euo pipefail
          cd staging
          SERVER_IP=$(terraform output -raw server_public_ip)

          # Wait for K3s to be ready using SSM
          echo "Waiting for K3s to be ready..."
          timeout 300 bash -c "until aws ssm send-command \
            --instance-ids \"$INSTANCE_ID\" \
            --document-name \"AWS-RunShellScript\" \
            --parameters 'commands=[\"test -f /etc/rancher/k3s/k3s.yaml\"]' \
            --query \"Command.CommandId\" --output text > /tmp/cmd.id && \
            aws ssm wait command-executed --command-id \$(cat /tmp/cmd.id) --instance-id \"$INSTANCE_ID\" 2>/dev/null; do echo 'Waiting for K3s...'; sleep 10; done"

          # Fetch kubeconfig using SSM
          echo "Fetching kubeconfig via SSM..."
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cat /etc/rancher/k3s/k3s.yaml"]' \
            --query "Command.CommandId" --output text)

          # Wait for command to complete
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"

          # Get the kubeconfig content
          mkdir -p ~/.kube
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text | \
            sed "s/127.0.0.1/${SERVER_IP}/g" > ~/.kube/config

          chmod 600 ~/.kube/config
          kubectl get nodes -o wide

      - name: Install nginx ingress (staging)
        shell: bash
        run: |
          set -euo pipefail
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            -n ingress-nginx --create-namespace \
            --set controller.service.type=NodePort \
            --set controller.service.nodePorts.http=30080 \
            --set controller.service.nodePorts.https=30443

      - name: Deploy app (staging)
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f deploy/kubernetes/complete-demo.yaml
          kubectl apply -f platform/k8s/ingress/sockshop-ingress.yaml

      - name: Wait + smoke test (staging)
        shell: bash
        run: |
          set -euo pipefail
          for d in $(kubectl -n sock-shop get deploy -o name); do
            kubectl -n sock-shop rollout status "$d" --timeout=10m
          done

          kubectl -n sock-shop port-forward svc/front-end 18080:80 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          sleep 3
          curl -fsS http://127.0.0.1:18080/ | head -n 10
          kill $PF_PID

  deploy-production:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
